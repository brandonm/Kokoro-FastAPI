name: Build and Publish GPU Image

on:
  push:
    branches: [master, feature/model-ttl]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          docker system prune -af

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=${OWNER,,}/kokoro-fastapi-gpu" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest

      # Blackwell-only build: cu128 torch wheels (sm_120) on a CUDA 12.8 base.
      # Covers the RTX 50-series (5090, 5060 Ti, ...). Older cards (sm_50..sm_90)
      # are intentionally not built here.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gpu/Dockerfile.optimized
          push: true
          build-args: |
            GPU_EXTRA=gpu-cu128
            CUDA_VERSION=12.8.1
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
